<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Minds</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; }
        header { background-color: #4CAF50; color: white; padding: 1rem; text-align: center; }
        .container { width: 80%; margin: auto; }
        form { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Creative Minds!</h1>
    </header>
    <div class="container">
        <h2>Create Your Story</h2>
        <form id="storyForm">
            <input type="text" id="title" placeholder="Story Title" required />
            <textarea id="story" rows="4" placeholder="Tell your story..." required></textarea>
            <button type="submit">Submit</button>
        </form>
        <div id="stories">
            <h3>Your Stories</h3>
            <ul id="storyList"></ul>
        </div>
    </div>
    <script>
        const form = document.getElementById('storyForm');
        const storyList = document.getElementById('storyList');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const title = document.getElementById('title').value;
            const story = document.getElementById('story').value;
            const li = document.createElement('li');
            li.textContent = title + ': ' + story;
            storyList.appendChild(li);
            form.reset();
        });
    </script>
</body>
</html>
