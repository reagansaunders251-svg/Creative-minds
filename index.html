<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Minds</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section id="post-story">
        <h2>Create Your Story</h2>
        <form>
            <label for="storyTitle">Story Title:</label>
            <input type="text" id="storyTitle" name="storyTitle" placeholder="Enter your story title here">
            
            <label for="storyContent">Your Story:</label>
            <textarea id="storyContent" name="storyContent" placeholder="Describe your story in detail"></textarea>
            
            <button type="submit">Publish</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
